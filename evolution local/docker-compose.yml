version: '3.8'

services:
  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: evolution_api_local
    ports:
      - "8080:8080" # Mapea el puerto 8080 del contenedor al de tu PC
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: evolution_redis_local
    ports:
      - "6379:6379"
    # Le ponemos una contraseña simple por compatibilidad con la URI de Evolution
    command: redis-server --requirepass gymple_redis_local
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  evolution_instances:
  evolution_store:
  redis_data: